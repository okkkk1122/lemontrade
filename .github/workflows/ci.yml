name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Start PostgreSQL and app
        run: docker compose up -d --build --wait

      - name: Install dependencies
        run: |
          npm ci
          cd backend && npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run full test suite
        env:
          QA_BASE: http://localhost:3010
          DATABASE_URL: postgresql://limootrade:limootrade_secret@127.0.0.1:5432/limootrade
          SESSION_SECRET: lemontrade-ci-secret-min-32-characters-long
        run: node scripts/run-all-tests.mjs
