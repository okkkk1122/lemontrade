services:
  postgres:
    image: postgres:16-alpine
    container_name: limootrade-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: limootrade
      POSTGRES_PASSWORD: limootrade_secret
      POSTGRES_DB: limootrade
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U limootrade -d limootrade"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: limootrade-app
    restart: unless-stopped
    ports:
      - "3010:3010"
    environment:
      NODE_ENV: production
      DISABLE_RATE_LIMIT: ${DISABLE_RATE_LIMIT:-true}
      COOKIE_SECURE: "false"
      PORT: 3010
      DATABASE_URL: postgresql://limootrade:limootrade_secret@postgres:5432/limootrade
      SESSION_SECRET: ${SESSION_SECRET:-lemontrade-dev-secret-min-32-characters-long}
      APP_URL: http://localhost:3010
      ZARINPAL_MERCHANT: ${ZARINPAL_MERCHANT:-}
      ZARINPAL_SANDBOX: ${ZARINPAL_SANDBOX:-true}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@lemontrade.com}
    volumes:
      - uploads_data:/app/frontend/public/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
