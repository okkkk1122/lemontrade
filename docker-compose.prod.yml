# Production overlay — usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Required in .env: DOMAIN, SESSION_SECRET, strong POSTGRES password

services:
  postgres:
    ports: []
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}

  app:
    ports: []
    environment:
      NODE_ENV: production
      DISABLE_RATE_LIMIT: "false"
      COOKIE_SECURE: "true"
      APP_URL: https://${DOMAIN}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      DATABASE_URL: postgresql://limootrade:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/limootrade

  caddy:
    image: caddy:2-alpine
    container_name: limootrade-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
